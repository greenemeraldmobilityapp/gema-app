name: gema_app
description: GEMA - Green Emerald Mobility App. Super-App lokal untuk Marketplace, Logistik, dan Jasa di Kabupaten Jepara.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.8

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # HTTP Client
  dio: ^5.4.3+1

  # UI & Icons
  material_symbols_icons: ^4.0.7839
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  toastification: ^2.1.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Utils
  connectivity_plus: ^6.0.5
  flutter_secure_storage: ^9.2.2
  formz: ^0.7.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.3

  # Notifications
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.2.1+2

  # Image Picker
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/patterns/
